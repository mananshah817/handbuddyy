<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | HandBuddyy</title>
  <link rel="stylesheet" href="./css/global.css">
  <style>
    .cart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 32px;
    }
    
    .cart-item {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border-color);
    }
    
    .cart-item-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      background: var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: 8px;
    }
    
    .cart-item-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .cart-item-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .cart-item-price {
      color: var(--accent-color);
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .qty-btn:hover {
      background: var(--bg-subtle);
      border-color: var(--secondary-color);
    }
    
    .remove-btn {
      color: #ef4444;
      background: none;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      margin-left: auto;
    }
    
    .remove-btn:hover {
      text-decoration: underline;
    }
    
    /* Order Summary Card */
    .summary-card {
      background: var(--bg-subtle);
      padding: 24px;
      border-radius: var(--radius-lg);
      position: sticky;
      top: 100px;
    }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
    
    .summary-total {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
      font-size: 1.25rem;
      font-weight: 700;
    }
    
    @media (max-width: 768px) {
      .cart-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="brand-logo">HandBuddyy</a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="shop.html" class="nav-link">Shop Bags</a></li>
        <li><a href="login.html" class="nav-link">Login</a></li>
        <li>
          <a href="cart.html" class="btn btn-primary" style="padding: 8px 16px">
            Cart <span class="cart-badge" id="nav-cart-count">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <h1 style="font-size: 2.5rem; margin-bottom: 40px;">Shopping Cart</h1>
      
      <div class="cart-grid" id="cart-container">
        <!-- Cart Items List will be injected here via main.js -->
        <div id="cart-items-wrapper"></div>
        
        <!-- Summary Box -->
        <div id="cart-summary-wrapper"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer style="background: var(--primary-color); color: white; padding: 40px 0; text-align: center; margin-top: auto;">
    <div class="container">
      <h3 style="margin-bottom: 8px;">HandBuddyy</h3>
      <p style="color: var(--text-muted);">&copy; 2026 HandBuddyy by Kriya M Shah. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="./js/firebase-init.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
