<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Bags | HandBuddyy</title>
  <link rel="stylesheet" href="./css/global.css">
  <style>
    .page-header {
      background: var(--primary-color);
      color: white;
      padding: 60px 0;
      text-align: center;
    }
    
    .product-img-wrapper {
      width: 100%;
      height: 300px;
      background: var(--bg-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    
    .product-img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      transition: transform 0.3s ease;
    }
    
    .card:hover .product-img {
      transform: scale(1.05);
    }
    
    .product-info {
      padding: 24px;
    }
    
    .product-title {
      font-size: 1.25rem;
      margin-bottom: 8px;
    }
    
    .product-desc {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 16px;
      min-height: 42px;
    }
    
    .product-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .product-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent-color);
    }
    
    .product-qty {
      font-size: 0.75rem;
      background: var(--bg-subtle);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      color: var(--secondary-color);
      font-weight: 600;
    }
    
    .out-of-stock {
      color: #ef4444;
      background: #fef2f2;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="brand-logo">HandBuddyy</a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="shop.html" class="nav-link active">Shop Bags</a></li>
        <li><a href="login.html" class="nav-link">Login</a></li>
        <li>
          <a href="cart.html" class="btn btn-primary" style="padding: 8px 16px">
            Cart <span class="cart-badge" id="nav-cart-count">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1 style="font-size: 3rem; margin-bottom: 12px;">Shop Collection</h1>
      <p style="font-size: 1.125rem; opacity: 0.8;">Find your perfect everyday companion.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <!-- Products Grid -->
      <div class="grid-3" id="shop-container">
        <!-- Products will be injected here via main.js -->
        <div style="text-align: center; padding: 40px; grid-column: span 3;">
          Loading products...
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer style="background: var(--primary-color); color: white; padding: 40px 0; text-align: center;">
    <div class="container">
      <h3 style="margin-bottom: 8px;">HandBuddyy</h3>
      <p style="color: var(--text-muted);">&copy; 2026 HandBuddyy by Kriya M Shah. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="./js/firebase-init.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
