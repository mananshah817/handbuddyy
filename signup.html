<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | HandBuddyy</title>
  <link rel="stylesheet" href="./css/global.css">
  <style>
    .auth-container {
      min-height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-subtle);
    }
    
    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="brand-logo">HandBuddyy</a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="shop.html" class="nav-link">Shop Bags</a></li>
        <li><a href="cart.html" class="btn btn-primary" style="padding: 8px 16px">
          Cart <span class="cart-badge" id="nav-cart-count">0</span>
        </a></li>
      </ul>
    </div>
  </nav>

  <div class="auth-container">
    <div class="card auth-card">
      <h1 style="margin-bottom: 8px;">Create Account</h1>
      <p style="color: var(--text-muted); margin-bottom: 32px;">Join HandBuddyy to track your orders and more.</p>
      
      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group" style="text-align: left;">
          <label class="form-label">Full Name</label>
          <input type="text" id="fullname" class="form-input" placeholder="Enter your full name" required>
        </div>

        <div class="form-group" style="text-align: left;">
          <label class="form-label">Mobile Number</label>
          <input type="tel" id="mobile" class="form-input" placeholder="Enter your 10 digit number" required pattern="[0-9]{10}">
        </div>
        
        <div class="form-group" style="text-align: left;">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Create a password" required>
        </div>

        <div style="margin: 24px 0 16px; font-weight: 600; color: var(--secondary-color); text-align: left; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">
          Delivery Address (Optional)
        </div>

        <div class="form-group" style="text-align: left;">
          <label class="form-label">Street Address</label>
          <input type="text" id="street" class="form-input" placeholder="Flat, Building, Street">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="form-group" style="text-align: left;">
            <label class="form-label">City</label>
            <input type="text" id="city" class="form-input" placeholder="e.g. Mumbai">
          </div>
          <div class="form-group" style="text-align: left;">
            <label class="form-label">Pincode</label>
            <input type="text" id="pincode" class="form-input" placeholder="e.g. 400001">
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 24px;">Sign Up</button>
      </form>
      
      <div style="margin-top: 24px;">
        <p style="font-size: 0.875rem; color: var(--text-muted);">
          Already have an account? <a href="login.html" style="color: var(--accent-color); font-weight: 600;">Log in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="./js/firebase-init.js"></script>
  <script src="./js/main.js"></script>
  <script>
    function handleSignup(e) {
      e.preventDefault();
      const mobile = document.getElementById('mobile').value;
      const pass = document.getElementById('password').value;
      const fullname = document.getElementById('fullname').value;
      
      const street = document.getElementById('street').value.trim();
      const city = document.getElementById('city').value.trim();
      const pin = document.getElementById('pincode').value.trim();
      
      if(mobile && pass && fullname) {
        const btn = document.querySelector('.btn-primary');
        const oldText = btn.textContent;
        btn.textContent = 'Creating...';
        btn.disabled = true;

        const userData = {
          fullname: fullname,
          pass: pass,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (street || city || pin) {
          userData.address = {
            street: street || '',
            city: city || '',
            pin: pin || ''
          };
        }

        db.collection('users').doc(mobile).set(userData).then(async () => {
          // If address was provided, also add it to the user's addresses subcollection for checkout usage
          if (street || city || pin) {
             const newAddr = { name: fullname, street: street || '', city: city || '', pin: pin || '' };
             await db.collection('users').doc(mobile).collection('addresses').add(newAddr);
          }
          showToast('Account created successfully! Please login.', 'success');
          setTimeout(() => {
            window.location.href = `login.html?mobile=${mobile}`;
          }, 1500);
        }).catch(err => {
          showToast('Error: ' + err.message, 'error');
          btn.textContent = oldText;
          btn.disabled = false;
        });
      }
    }
  </script>
</body>
</html>
