<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | HandBuddyy</title>
  <link rel="stylesheet" href="./css/global.css">
  <style>
    .auth-container {
      min-height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-subtle);
    }
    
    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="brand-logo">HandBuddyy</a>
      
      <button class="menu-toggle" id="mobile-menu-btn" aria-label="Toggle Menu">
        &#9776;
      </button>

      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="shop.html" class="nav-link">Shop Bags</a></li>
        <li><a href="cart.html" class="btn btn-primary" style="padding: 8px 16px">
          Cart <span class="cart-badge" id="nav-cart-count">0</span>
        </a></li>
      </ul>
    </div>
  </nav>

  <div class="auth-container">
    <div class="card auth-card">
      <h1 style="margin-bottom: 8px;">Welcome Back</h1>
      <p style="color: var(--text-muted); margin-bottom: 32px;">Please enter your details to login.</p>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group" style="text-align: left;">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group" style="text-align: left;">
          <label class="form-label" style="display: flex; justify-content: space-between;">
            <span>Password</span>
            <a href="#" style="color: var(--accent-color); font-size: 0.875rem; font-weight: normal; text-decoration: none;">Forgot?</a>
          </label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 24px;">Login to Account</button>
      </form>
      
      <div style="margin-top: 24px;">
        <p style="font-size: 0.875rem; color: var(--text-muted);">
          Don't have an account? <a href="signup.html" style="color: var(--accent-color); font-weight: 600;">Sign up</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="./js/firebase-init.js"></script>
  <script src="./js/main.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      
      if(email && pass) {
        const btn = document.querySelector('.btn-primary');
        const oldText = btn.textContent;
        btn.textContent = 'Logging in...';
        btn.disabled = true;

        try {
          await auth.signInWithEmailAndPassword(email, pass);
          showToast('Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        } catch (error) {
          console.error("Login Error:", error);
          let errorMsg = "Invalid email or password.";
          if (error.code === 'auth/user-not-found') errorMsg = "No account found with this email.";
          if (error.code === 'auth/wrong-password') errorMsg = "Incorrect password.";
          
          showToast(errorMsg, 'error');
          btn.textContent = oldText;
          btn.disabled = false;
        }
      }
    }
  </script>
</body>
</html>
